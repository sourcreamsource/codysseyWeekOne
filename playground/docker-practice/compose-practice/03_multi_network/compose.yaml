services:
  web:
    image: nginx:latest
    container_name: proof-multi-web
    ports:
      - "8082:80"
    volumes:
      - ./html/index.html:/usr/share/nginx/html/index.html:ro

  helper:
    image: busybox:1.36
    container_name: proof-multi-helper
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - web
